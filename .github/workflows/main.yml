name: Java CI with Maven

on:
  push:
    branches: [ "main", "part2poe" ]
  pull_request:
    branches: [ "main", "part2poe" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile and Run Tests Manual Fallback
      run: |
        mkdir -p src/main/java/com/mycompany/message/java
        mkdir -p src/test/java/com/mycompany/message/java
        mv Message.java src/main/java/com/mycompany/message/java/ || true
        mv QuickChat.java src/main/java/com/mycompany/message/java/ || true
        mv MessageTest.java src/test/java/com/mycompany/message/java/ || true
        
        echo '<project xmlns="http://apache.org" xmlns:xsi="http://w3.org" xsi:schemaLocation="http://apache.org http://apache.org"><modelVersion>4.0.0</modelVersion><groupId>com.mycompany</groupId><artifactId>message</artifactId><version>1.0-SNAPSHOT</version><properties><maven.compiler.source>17</maven.compiler.source><maven.compiler.target>17</maven.compiler.target></properties><dependencies><dependency><groupId>org.junit.jupiter</groupId><artifactId>junit-jupiter-api</artifactId><version>5.11.0</version><scope>test</scope></dependency><dependency><groupId>org.junit.jupiter</groupId><artifactId>junit-jupiter-engine</artifactId><version>5.11.0</version><scope>test</scope></dependency></dependencies></project>' > pom.xml
        
        mvn -B test
